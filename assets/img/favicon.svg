<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <linearGradient id="g" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#E8C547"/>
      <stop offset="50%" style="stop-color:#C9A227"/>
      <stop offset="100%" style="stop-color:#8B6914"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="1.5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="100" height="100" rx="14" fill="#070707"/>
  <!-- Outer octagon frame -->
  <polygon points="50,5 82,22 95,55 82,85 50,95 18,85 5,55 18,22"
           fill="none" stroke="url(#g)" stroke-width="2.2" filter="url(#glow)"/>
  <!-- Inner octagon (subtle) -->
  <polygon points="50,17 74,30 83,54 74,76 50,83 26,76 17,54 26,30"
           fill="none" stroke="#C9A227" stroke-width="0.7" opacity="0.35"/>
  <!-- Cardinal tick marks -->
  <line x1="50" y1="5"  x2="50" y2="15"  stroke="#C9A227" stroke-width="2.5"/>
  <line x1="50" y1="85" x2="50" y2="95"  stroke="#C9A227" stroke-width="2.5"/>
  <line x1="5"  y1="55" x2="15" y2="55"  stroke="#C9A227" stroke-width="2.5"/>
  <line x1="85" y1="55" x2="95" y2="55"  stroke="#C9A227" stroke-width="2.5"/>
  <!-- Code symbol -->
  <text x="50" y="53" font-family="monospace,Courier New,sans-serif" font-size="22"
        font-weight="bold" fill="url(#g)" text-anchor="middle" filter="url(#glow)">&lt;/&gt;</text>
  <!-- DEV label -->
  <text x="50" y="68" font-family="Arial,sans-serif" font-size="9.5"
        fill="#C9A227" text-anchor="middle" letter-spacing="3.5" opacity="0.9">DEV</text>
  <!-- Diamond accent top/bottom -->
  <polygon points="50,2 53,7 50,12 47,7"  fill="#C9A227" opacity="0.85"/>
  <polygon points="50,88 53,93 50,98 47,93" fill="#C9A227" opacity="0.85"/>
</svg>
