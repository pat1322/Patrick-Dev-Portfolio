<style>
  /* ===== HEADER STYLES ===== */
  .profile-img-container {
    display: flex;
    justify-content: center;
    align-items: center;
    margin-top: 15px;
    margin-bottom: 30px;
  }

  .profile-img {
    position: relative;
    width: 120px;
    height: 120px;
    border-radius: 50%;
  }

  .profile-img .static-img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    border-radius: 50%;
    position: absolute;
    top: 0;
    left: 0;
    transition: opacity 0.3s ease-in-out;
  }

  .profile-img .gif-overlay {
    width: 100%;
    height: 100%;
    object-fit: cover;
    border-radius: 50%;
    position: absolute;
    top: 0;
    left: 0;
    opacity: 0;
    transition: opacity 0.3s ease-in-out;
  }

  .profile-img:hover .static-img { opacity: 0; }
  .profile-img:hover .gif-overlay { opacity: 1; }

  .profile-img::after {
    content: "";
    position: absolute;
    top: 63%;
    left: 50%;
    transform: translate(-50%, -50%);
    width: 120px;
    height: 120px;
    border-radius: 50%;
    box-shadow: 0 0 15px rgba(0, 183, 255, 0.8);
    animation: neonGlow 1.5s infinite linear;
    pointer-events: none;
  }

  @keyframes neonGlow {
    0%   { box-shadow: 0 0 5px rgba(0, 183, 255, 0.5); }
    50%  { box-shadow: 0 0 20px rgba(0, 183, 255, 1); }
    100% { box-shadow: 0 0 5px rgba(0, 183, 255, 0.5); }
  }

  .navmenu { text-align: left; width: 100%; padding-left: 0; }
  .navmenu ul { list-style: none; padding-left: 0; }
  .navmenu li { text-align: left; margin-bottom: 0; }

  /* ===== NOT FOUND STATE ===== */

    padding: 80px 20px;
    color: #6c757d;
  }
  .project-not-found h2 { margin-bottom: 15px; }
</style>
