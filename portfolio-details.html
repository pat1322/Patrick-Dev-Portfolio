<style>
  /* ===== CURSOR ===== */
  .cursor-dot,
  .cursor-ring {
    position: fixed;
    top: 0;
    left: 0;
    pointer-events: none;
    z-index: 99999;
    transform: translate(-50%, -50%);
    opacity: 0;
    transition: opacity 0.3s ease;
  }
  body.cursor-ready .cursor-dot,
  body.cursor-ready .cursor-ring {
    opacity: 1;
  }
  .cursor-dot {
    width: 8px;
    height: 8px;
    background: #C9A227;
    border-radius: 50%;
  }
  .cursor-ring {
    width: 36px;
    height: 36px;
    border: 1.5px solid rgba(201, 162, 39, 0.7);
    border-radius: 50%;
    transition: opacity 0.3s ease, width 0.2s ease, height 0.2s ease, border-color 0.2s ease;
  }
  .cursor-ring.hovering {
    width: 52px;
    height: 52px;
    border-color: #C9A227;
  }

  /* ===== BASE ===== */
  body {
    background: #0f0f13;
    color: #F0E6CC;
    font-family: 'Raleway', sans-serif;
  }

  /* ===== HEADER STYLES ===== */
  .profile-img-container {
    display: flex;
    justify-content: center;
    align-items: center;
    margin-top: 15px;
    margin-bottom: 30px;
  }

  .profile-img {
    position: relative;
    width: 120px;
    height: 120px;
    border-radius: 50%;
  }

  .profile-img .static-img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    border-radius: 50%;
    position: absolute;
    top: 0;
    left: 0;
    transition: opacity 0.3s ease-in-out;
  }

  .profile-img .gif-overlay {
    width: 100%;
    height: 100%;
    object-fit: cover;
    border-radius: 50%;
    position: absolute;
    top: 0;
    left: 0;
    opacity: 0;
    transition: opacity 0.3s ease-in-out;
  }

  .profile-img:hover .static-img { opacity: 0; }
  .profile-img:hover .gif-overlay { opacity: 1; }

  .profile-img::after {
    content: "";
    position: absolute;
    top: 63%;
    left: 50%;
    transform: translate(-50%, -50%);
    width: 120px;
    height: 120px;
    border-radius: 50%;
    box-shadow: 0 0 0 2px rgba(201, 162, 39, 0.5);
    animation: goldPulse 2.5s ease-in-out infinite;
    pointer-events: none;
  }

  @keyframes goldPulse {
    0%   { box-shadow: 0 0 0 2px rgba(201, 162, 39, 0.3); }
    50%  { box-shadow: 0 0 12px 4px rgba(201, 162, 39, 0.7); }
    100% { box-shadow: 0 0 0 2px rgba(201, 162, 39, 0.3); }
  }

  .navmenu { text-align: left; width: 100%; padding-left: 0; }
  .navmenu ul { list-style: none; padding-left: 0; }
  .navmenu li { text-align: left; margin-bottom: 0; }

  /* ===== MAIN CONTENT ===== */
  #main-content {
    background: #101014;
  }

  /* ===== PAGE TITLE ===== */
  .page-title {
    background: #0a0a0e;
    padding: 28px 0 20px;
    border-bottom: 1px solid rgba(201, 162, 39, 0.15);
  }

  .page-title h1 {
    font-family: 'Cormorant Garamond', serif;
    font-size: 2rem;
    font-weight: 600;
    color: #C9A227;
    letter-spacing: 0.04em;
    margin: 0;
  }

  .page-title .breadcrumbs ol {
    display: flex;
    flex-wrap: wrap;
    list-style: none;
    padding: 0;
    margin: 0;
    gap: 6px;
    align-items: center;
    font-size: 0.82rem;
    font-family: 'Raleway', sans-serif;
    letter-spacing: 0.06em;
    text-transform: uppercase;
  }

  .page-title .breadcrumbs ol li a {
    color: #8a7a60;
    text-decoration: none;
    transition: color 0.2s;
  }

  .page-title .breadcrumbs ol li a:hover {
    color: #C9A227;
  }

  .page-title .breadcrumbs ol li.current {
    color: #C9A227;
  }

  .page-title .breadcrumbs ol li + li::before {
    content: '/';
    color: rgba(201, 162, 39, 0.4);
    margin-right: 6px;
  }

  /* ===== PORTFOLIO DETAILS SECTION ===== */
  .portfolio-details.section {
    background: #101014;
    padding: 60px 0 80px;
  }

  /* ===== SWIPER / SLIDER ===== */
  .portfolio-details-slider {
    border-radius: 6px;
    overflow: hidden;
    border: 1px solid rgba(201, 162, 39, 0.18);
    box-shadow: 0 8px 40px rgba(0, 0, 0, 0.6), 0 0 0 1px rgba(201, 162, 39, 0.08);
  }

  .portfolio-details-slider .swiper-slide img {
    width: 100%;
    display: block;
    object-fit: cover;
    max-height: 460px;
  }

  .portfolio-details-slider .swiper-pagination-bullet {
    background: rgba(201, 162, 39, 0.35);
    opacity: 1;
  }

  .portfolio-details-slider .swiper-pagination-bullet-active {
    background: #C9A227;
  }

  /* ===== PORTFOLIO INFO CARD ===== */
  .portfolio-info {
    background: #1a1a20;
    border: 1px solid rgba(201, 162, 39, 0.18);
    border-radius: 6px;
    padding: 28px 28px 20px;
    margin-bottom: 28px;
    position: relative;
    overflow: hidden;
  }

  .portfolio-info::before {
    content: '';
    position: absolute;
    top: 0;
    left: 0;
    width: 3px;
    height: 100%;
    background: linear-gradient(180deg, #C9A227 0%, rgba(201, 162, 39, 0.1) 100%);
    border-radius: 6px 0 0 6px;
  }

  .portfolio-info h3 {
    font-family: 'Cormorant Garamond', serif;
    font-size: 1.35rem;
    font-weight: 600;
    color: #C9A227;
    letter-spacing: 0.05em;
    margin-bottom: 18px;
    padding-bottom: 12px;
    border-bottom: 1px solid rgba(201, 162, 39, 0.15);
  }

  .portfolio-info ul {
    list-style: none;
    padding: 0;
    margin: 0;
  }

  .portfolio-info ul li {
    padding: 9px 0 9px 14px;
    position: relative;
    color: #F0E6CC;
    font-size: 0.9rem;
    line-height: 1.5;
    border-bottom: 1px solid rgba(255, 255, 255, 0.04);
  }

  .portfolio-info ul li:last-child {
    border-bottom: none;
  }

  .portfolio-info ul li::before {
    content: '';
    position: absolute;
    left: 0;
    top: 50%;
    transform: translateY(-50%);
    width: 3px;
    height: 60%;
    background: rgba(201, 162, 39, 0.45);
    border-radius: 2px;
  }

  .portfolio-info ul li strong {
    color: #C9A227;
    font-weight: 600;
    margin-right: 4px;
  }

  .portfolio-info ul li a {
    color: #C9A227;
    text-decoration: none;
    border-bottom: 1px solid transparent;
    transition: border-color 0.2s ease, color 0.2s ease;
  }

  .portfolio-info ul li a:hover {
    color: #e8c547;
    border-bottom-color: #C9A227;
  }

  /* ===== PORTFOLIO DESCRIPTION ===== */
  .portfolio-description {
    background: #1a1a20;
    border: 1px solid rgba(201, 162, 39, 0.18);
    border-radius: 6px;
    padding: 28px 28px 24px;
    position: relative;
    overflow: hidden;
  }

  .portfolio-description::before {
    content: '';
    position: absolute;
    top: 0;
    left: 0;
    width: 3px;
    height: 100%;
    background: linear-gradient(180deg, rgba(201, 162, 39, 0.6) 0%, rgba(201, 162, 39, 0.05) 100%);
    border-radius: 6px 0 0 6px;
  }

  .portfolio-description h2 {
    font-family: 'Cormorant Garamond', serif;
    font-size: 1.55rem;
    font-weight: 600;
    color: #F0E6CC;
    letter-spacing: 0.03em;
    margin-bottom: 14px;
    line-height: 1.3;
  }

  .portfolio-description p {
    color: #b0a080;
    line-height: 1.9;
    font-size: 0.92rem;
    margin-bottom: 0;
  }

  /* ===== NOT FOUND STATE ===== */
  .project-not-found {
    text-align: center;
    padding: 80px 20px;
    color: #8a7a60;
  }

  .project-not-found h2 {

    font-size: 1.8rem;

  }

  .scroll-top {
    background: #C9A227;

    transition: background 0.2s ease, transform 0.2s ease;
  }

  /* ===== FOOTER ===== */

    border-top: 1px solid rgba(201, 162, 39, 0.12);

    text-decoration: none;
    transition: color 0.2s ease;
  }

  #footer .credits a:hover {
    color: #e8c547;
  }

  /* ===== BACKGROUND SHAPES ===== */
  .pd-bg {
    position: fixed;
    inset: 0;
    pointer-events: none;
    overflow: hidden;
    z-index: 0;
  }
  .pd-shape {
    position: absolute;
    border: 1px solid rgba(201, 162, 39, 0.10);
    animation: pdFloat linear infinite;
  }
  .pd-shape-1 {
    width: 420px; height: 420px;
    top: 3%; right: -10%;
    border-radius: 30% 70% 70% 30% / 30% 30% 70% 70%;
    animation-duration: 30s;
    border-color: rgba(201, 162, 39, 0.06);
  }
  .pd-shape-2 {
    width: 220px; height: 220px;
    top: 35%; left: -6%;
    border-radius: 50%;
    animation-duration: 24s;
    animation-delay: -10s;
    border-color: rgba(201, 162, 39, 0.07);
  }
  .pd-shape-3 {
    width: 110px; height: 110px;
    bottom: 22%; right: 12%;
    border-radius: 50%;
    animation-duration: 19s;
    animation-delay: -16s;
    border-color: rgba(201, 162, 39, 0.10);
  }
  .pd-shape-4 {
    width: 320px; height: 1px;
    top: 55%; left: 25%;
    background: linear-gradient(90deg, transparent, rgba(201,162,39,0.22), transparent);
    border: none;
    animation: pdShimmer 7s ease-in-out infinite;
  }
  .pd-shape-5 {
    width: 160px; height: 160px;
    bottom: 6%; left: 18%;
    border-radius: 20% 80% 40% 60% / 60% 40% 80% 20%;
    animation-duration: 26s;
    animation-delay: -6s;
    border-color: rgba(201, 162, 39, 0.06);
  }
  .pd-shape-6 {
    width: 60px; height: 60px;
    top: 20%; left: 40%;
    border-radius: 50%;
    animation-duration: 15s;
    animation-delay: -3s;
    border-color: rgba(201, 162, 39, 0.12);
  }
  @keyframes pdFloat {
    0%, 100% { transform: translateY(0) rotate(0deg); }
    50%       { transform: translateY(-28px) rotate(180deg); }
  }
  @keyframes pdShimmer {
    0%, 100% { opacity: 0.14; transform: scaleX(1); }
    50%       { opacity: 0.42; transform: scaleX(1.28); }
  }
  /* Ambient radial glow on main content */
  #main-content {
    position: relative;
    z-index: 1;
  }
  #main-content::before {
    content: '';
    position: fixed;
    inset: 0;
    background:
      radial-gradient(ellipse 55% 40% at 85% 18%, rgba(201,162,39,0.04) 0%, transparent 65%),
      radial-gradient(ellipse 45% 35% at 12% 78%, rgba(201,162,39,0.03) 0%, transparent 60%);
    pointer-events: none;
    z-index: 0;
  }
  .page-title,
  .portfolio-details.section {
    position: relative;
    z-index: 1;
  }

  /* ===== SPACING HELPERS ===== */

    }

</style>

  function getProjectId() {
    return new URLSearchParams(window.location.search).get('project');
  }

  function buildSlides(images) {
    return images.map(function (img) {
      return '<div class="swiper-slide"><img src="assets/img/portfolio/' + img + '" alt=""></div>';
    }).join('\n');
  }

  function buildInfoList(info) {
    return info.map(function (item) {
      return '<li><strong>' + item.label + '</strong>: ' + item.value + '</li>';
    }).join('\n');
  }

  document.addEventListener('DOMContentLoaded', function () {
    var id = getProjectId();

    /* Try loading project detail data from server config first (admin-editable),
       then fall back to the hardcoded projects object above */
    function renderProject(project) {
      if (!project) {
        document.getElementById('project-title').textContent = 'Project Not Found';
        document.getElementById('project-content').innerHTML =
          '<div class="project-not-found col-12">' +
          '<h2>Project not found</h2>' +
          '<p><a href="index.html#portfolio">Back to Portfolio</a></p>' +
          '</div>';
        return;
      }
      document.title = project.title + ' - Patrick Perez';
      document.getElementById('project-title').textContent = project.title;
      buildContent(project);
    }

    /* Parse a config project object (with detailImages/detailDesc/detailInfo fields)
       into the shape expected by buildContent */
    function cfgProjectToDetail(p) {
      var imgs = (p.detailImages || p.img || '').split(',').map(function(s){ return s.trim(); }).filter(Boolean);
      // Strip path prefix from image names for buildSlides
      imgs = imgs.map(function(s) { return s.replace(/^assets\/img\/portfolio\//, ''); });
      var infoLines = (p.detailInfo || '').split('\n').filter(Boolean);
      var infoItems = infoLines.map(function(line) {
        var sep = line.indexOf(':');
        if (sep < 0) return { label: line, value: '' };
        return { label: line.slice(0, sep).trim(), value: line.slice(sep+1).trim() };
      });
      // Auto-append YouTube/download links if set
      if (p.youtubeUrl) infoItems.push({ label: 'Preview', value: '<a href="' + p.youtubeUrl + '" target="_blank">Watch on YouTube</a>' });
      if (p.downloadUrl) infoItems.push({ label: 'Download', value: '<a href="' + p.downloadUrl + '" target="_blank">Open Link</a>' });
      return {
        title: p.title || p.id,
        images: imgs,
        info: infoItems,
        description: p.detailDesc || p.description || ''
      };
    }

    function loadAndRender() {
      /* Check localStorage preview first */
      try {
        var local = JSON.parse(localStorage.getItem('pfConfig') || 'null');
        if (local && local.projects) {
          var lp = local.projects.filter(function(p){ return p.id === id; })[0];
          if (lp && lp.detailImages) { renderProject(cfgProjectToDetail(lp)); return; }
        }
      } catch(e) {}

      /* Fetch from server config */
      fetch('/api/config')
        .then(function(r) { return r.ok ? r.json() : Promise.reject(); })
        .then(function(cfg) {
          if (cfg && cfg.projects) {
            var cp = cfg.projects.filter(function(p){ return p.id === id; })[0];
            if (cp && cp.detailImages) { renderProject(cfgProjectToDetail(cp)); return; }
          }
          renderProject(id ? projects[id] : null);
        })
        .catch(function() {
          renderProject(id ? projects[id] : null);
        });
    }

    loadAndRender();

    function buildContent(project) {

    document.getElementById('project-content').innerHTML =
      '<div class="col-lg-8">' +
        '<div class="portfolio-details-slider swiper">' +
          '<div class="swiper-wrapper align-items-center">' +
            buildSlides(project.images) +
          '</div>' +
          '<div class="swiper-pagination"></div>' +
        '</div>' +
      '</div>' +
      '<div class="col-lg-4">' +
        '<div class="portfolio-info" data-aos="fade-up" data-aos-delay="200">' +
          '<h3>Project information</h3>' +
          '<ul>' + buildInfoList(project.info) + '</ul>' +
        '</div>' +
        '<div class="portfolio-description" data-aos="fade-up" data-aos-delay="300">' +
          '<h2>' + project.title + '</h2>' +
          '<p>' + project.description + '</p>' +
        '</div>' +
      '</div>';

    // Init Swiper directly after DOM is built
    new Swiper('.portfolio-details-slider', {
      loop: true,
      speed: 600,
      autoplay: { delay: 5000 },
      slidesPerView: 'auto',
      pagination: {
        el: '.swiper-pagination',
        type: 'bullets',
        clickable: true
      }
    });

    // Init AOS after content is injected
    if (typeof AOS !== 'undefined') {
      AOS.init({ duration: 700, once: true });
    }

    // GSAP entrance animations
    if (typeof gsap !== 'undefined') {
      if (typeof ScrollTrigger !== 'undefined') {
        gsap.registerPlugin(ScrollTrigger);
      }

      // Page title slides in from top
      gsap.from('.page-title', {
        y: -40, opacity: 0, duration: 0.8, ease: 'power3.out'
      });

      // Two columns stagger up
      gsap.from('#project-content > div', {
        y: 55, opacity: 0, duration: 0.85,
        stagger: 0.18, delay: 0.25, ease: 'power3.out'
      });

      // Slider image subtle zoom-in
      gsap.from('.portfolio-details-slider', {
        scale: 0.96, opacity: 0, duration: 1.1,
        delay: 0.1, ease: 'power2.out'
      });

      // Info + description cards cascade with slight rotation
      gsap.from('.portfolio-info', {
        x: 30, opacity: 0, duration: 0.75,
        delay: 0.45, ease: 'power3.out'
      });
      gsap.from('.portfolio-description', {
        x: 30, opacity: 0, duration: 0.75,
        delay: 0.62, ease: 'power3.out'
      });

      // Each info list item staggers in
      gsap.from('.portfolio-info ul li', {
        x: 15, opacity: 0, duration: 0.5,
        stagger: 0.07, delay: 0.65, ease: 'power2.out'
      });

      // Background shapes drift in subtly
      gsap.from('.pd-shape', {
        opacity: 0, scale: 0.85, duration: 2,
        stagger: 0.2, delay: 0.1, ease: 'power1.out'
      });

      // ScrollTrigger: parallax on bg shapes as user scrolls
      if (typeof ScrollTrigger !== 'undefined') {
        document.querySelectorAll('.pd-shape').forEach(function(shape, i) {
          gsap.to(shape, {
            y: (i % 2 === 0 ? -60 : 60) * (0.5 + i * 0.15),
            ease: 'none',
            scrollTrigger: {
              trigger: '#main-content',
              start: 'top top',
              end: 'bottom bottom',
              scrub: 1.5
            }
          });
        });
      }
    }

    // Re-attach cursor hover listeners to newly injected elements
    var cursorRing = document.querySelector('.cursor-ring');
    if (cursorRing) {
      document.querySelectorAll('a, button, .portfolio-info, .swiper-slide').forEach(function (el) {
        el.addEventListener('mouseenter', function () { cursorRing.classList.add('hovering'); });
        el.addEventListener('mouseleave', function () { cursorRing.classList.remove('hovering'); });
      });
    }
    } /* end buildContent */
  });
})();
</script>

<!-- Custom cursor -->
<script>
(function () {
  if (!window.matchMedia('(hover: hover) and (pointer: fine)').matches) return;
  var dot  = document.querySelector('.cursor-dot');
  var ring = document.querySelector('.cursor-ring');
  if (!dot || !ring) return;
  var mouseX = 0, mouseY = 0, ringX = 0, ringY = 0;
  document.addEventListener('mousemove', function (e) {
    mouseX = e.clientX; mouseY = e.clientY;
    dot.style.left = mouseX + 'px'; dot.style.top = mouseY + 'px';
    document.body.classList.add('cursor-ready');
  });
  (function animateRing() {
    ringX += (mouseX - ringX) * 0.12; ringY += (mouseY - ringY) * 0.12;
    ring.style.left = ringX + 'px'; ring.style.top = ringY + 'px';
    requestAnimationFrame(animateRing);
  })();
  var targets = 'a, button, .portfolio-info, .swiper-slide';
  document.querySelectorAll(targets).forEach(function (el) {
    el.addEventListener('mouseenter', function () { ring.classList.add('hovering'); });
    el.addEventListener('mouseleave', function () { ring.classList.remove('hovering'); });
  });
})();
</script>
