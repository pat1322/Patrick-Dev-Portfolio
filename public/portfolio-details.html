<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Project Details — Patrick Perez</title>
  <meta name="description" content="Project detail page">

  <link rel="icon" href="/assets/img/favicon.png">
  <link rel="apple-touch-icon" href="/assets/img/apple-touch-icon.png">

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">

  <!-- Icons -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

  <!-- AOS -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/aos@2.3.4/dist/aos.css">

  <link rel="stylesheet" href="/css/style.css">

  <style>
    /* ── Details-page specifics ───────────────────── */
    .details-hero {
      padding-top: calc(var(--header-h, 70px) + 3rem);
      padding-bottom: 3rem;
      background: var(--bg);
    }
    .details-back {
      display: inline-flex;
      align-items: center;
      gap: .5rem;
      color: var(--muted);
      font-size: .875rem;
      margin-bottom: 2rem;
      transition: color .2s;
    }
    .details-back:hover { color: var(--accent); text-decoration: none; }

    .details-grid {
      display: grid;
      grid-template-columns: 1fr 340px;
      gap: 3rem;
      align-items: start;
    }
    @media (max-width: 900px) {
      .details-grid { grid-template-columns: 1fr; }
    }

    .details-thumbnail {
      width: 100%;
      border-radius: 16px;
      overflow: hidden;
      border: 1px solid rgba(255,255,255,.07);
      aspect-ratio: 16/9;
      background: var(--surface);
    }
    .details-thumbnail img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .details-title {
      font-family: 'Syne', sans-serif;
      font-size: 2.25rem;
      font-weight: 800;
      margin: 1.5rem 0 1rem;
      line-height: 1.2;
    }
    .details-tags {
      display: flex;
      flex-wrap: wrap;
      gap: .5rem;
      margin-bottom: 1.5rem;
    }
    .details-tag {
      background: rgba(0,212,255,.08);
      color: var(--accent);
      border: 1px solid rgba(0,212,255,.15);
      border-radius: 99px;
      padding: .25rem .85rem;
      font-size: .8rem;
      font-weight: 500;
    }
    .details-description {
      color: var(--muted);
      line-height: 1.8;
      font-size: 1rem;
    }

    /* Sidebar info card */
    .info-sidebar {
      background: var(--surface);
      border: 1px solid rgba(255,255,255,.07);
      border-radius: 16px;
      padding: 1.75rem;
      position: sticky;
      top: 90px;
    }
    .info-sidebar h3 {
      font-family: 'Syne', sans-serif;
      font-size: 1rem;
      font-weight: 700;
      margin-bottom: 1.25rem;
      color: var(--text);
    }
    .info-row {
      display: flex;
      align-items: flex-start;
      gap: .75rem;
      padding: .75rem 0;
      border-bottom: 1px solid rgba(255,255,255,.05);
    }
    .info-row:last-of-type { border-bottom: none; }
    .info-row i {
      font-size: 1rem;
      color: var(--accent);
      margin-top: .15rem;
      flex-shrink: 0;
    }
    .info-label {
      font-size: .75rem;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: .06em;
      font-weight: 600;
      display: block;
      margin-bottom: .15rem;
    }
    .info-value {
      font-size: .9rem;
      color: var(--text);
      font-weight: 500;
    }
    .details-cta {
      margin-top: 1.5rem;
      display: flex;
      flex-direction: column;
      gap: .75rem;
    }

    /* Not found state */
    .not-found {
      text-align: center;
      padding: 6rem 1rem;
    }
    .not-found h2 {
      font-family: 'Syne', sans-serif;
      font-size: 2rem;
      margin-bottom: 1rem;
    }
    .not-found p { color: var(--muted); margin-bottom: 2rem; }
  </style>
</head>
<body>

  <!-- ── CUSTOM CURSOR ─────────────────────────────────── -->
  <div id="cursor-dot"></div>
  <div id="cursor-ring"></div>

  <!-- ── SCROLL PROGRESS ───────────────────────────────── -->
  <div id="scroll-progress"></div>

  <!-- ── HEADER ────────────────────────────────────────── -->
  <header id="header">
    <nav class="nav container">
      <a href="/#hero" class="nav-logo">PP<span class="dot">.</span></a>
      <ul class="nav-links" id="nav-links">
        <li><a href="/#about">About</a></li>
        <li><a href="/#skills">Skills</a></li>
        <li><a href="/#experience">Experience</a></li>
        <li><a href="/#projects">Projects</a></li>
        <li><a href="/#contact">Contact</a></li>
      </ul>
      <button class="nav-toggle" id="nav-toggle" aria-label="Toggle menu">
        <span></span><span></span><span></span>
      </button>
    </nav>
  </header>

  <!-- ── MAIN CONTENT ──────────────────────────────────── -->
  <main id="details-main">
    <div class="details-hero">
      <div class="container" id="details-container">
        <!-- Rendered by JS -->
        <div class="not-found" id="loading-state">
          <p style="color:var(--muted)">Loading project…</p>
        </div>
      </div>
    </div>
  </main>

  <!-- ── FOOTER ─────────────────────────────────────────── -->
  <footer id="footer">
    <div class="container footer-inner">
      <a href="/#hero" class="footer-logo">PP<span class="dot">.</span></a>
      <p class="footer-copy">© <span id="footer-year"></span> Patrick Perez. All rights reserved.</p>
      <div class="footer-socials" id="footer-socials"></div>
    </div>
  </footer>

  <!-- ── SCROLL TO TOP ──────────────────────────────────── -->
  <button id="scroll-top" aria-label="Scroll to top"><i class="bi bi-arrow-up"></i></button>

  <!-- Scripts -->
  <script src="https://cdn.jsdelivr.net/npm/aos@2.3.4/dist/aos.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
  <script>
  (async function () {
    'use strict';

    // ── AOS ──────────────────────────────────────────────
    if (typeof AOS !== 'undefined') AOS.init({ duration: 700, easing: 'ease-out-cubic', once: true, offset: 60 });

    // ── FOOTER YEAR ──────────────────────────────────────
    const yearEl = document.getElementById('footer-year');
    if (yearEl) yearEl.textContent = new Date().getFullYear();

    // ── CUSTOM CURSOR ────────────────────────────────────
    const dot  = document.getElementById('cursor-dot');
    const ring = document.getElementById('cursor-ring');
    if (dot && ring && window.matchMedia('(pointer:fine)').matches) {
      let ringX = 0, ringY = 0;
      const LERP = 0.14;
      document.addEventListener('mousemove', e => {
        dot.style.left = e.clientX + 'px';
        dot.style.top  = e.clientY + 'px';
      });
      (function animateRing() {
        const tx = parseFloat(dot.style.left) || 0;
        const ty = parseFloat(dot.style.top)  || 0;
        ringX += (tx - ringX) * LERP;
        ringY += (ty - ringY) * LERP;
        ring.style.left = ringX + 'px';
        ring.style.top  = ringY + 'px';
        requestAnimationFrame(animateRing);
      })();
    }

    // ── SCROLL PROGRESS ──────────────────────────────────
    const progressBar = document.getElementById('scroll-progress');
    const header = document.getElementById('header');
    const scrollTopBtn = document.getElementById('scroll-top');
    function onScroll() {
      const max = document.documentElement.scrollHeight - window.innerHeight;
      if (progressBar) progressBar.style.width = (max > 0 ? (window.scrollY / max) * 100 : 0) + '%';
      if (header) header.classList.toggle('scrolled', window.scrollY > 40);
      if (scrollTopBtn) scrollTopBtn.classList.toggle('visible', window.scrollY > 400);
    }
    window.addEventListener('scroll', onScroll, { passive: true });
    onScroll();
    if (scrollTopBtn) scrollTopBtn.addEventListener('click', () => window.scrollTo({ top: 0, behavior: 'smooth' }));

    // ── MOBILE NAV ───────────────────────────────────────
    const navToggle = document.getElementById('nav-toggle');
    const navLinks  = document.getElementById('nav-links');
    if (navToggle && navLinks) {
      navToggle.addEventListener('click', () => navLinks.classList.toggle('open'));
      navLinks.querySelectorAll('a').forEach(a => a.addEventListener('click', () => navLinks.classList.remove('open')));
    }

    // ── LOAD DATA ────────────────────────────────────────
    let data = {};
    try {
      const r = await fetch('/api/data');
      data = await r.json();
    } catch (e) {
      console.error('Failed to load data', e);
    }

    // Footer socials
    const footerSocials = document.getElementById('footer-socials');
    if (footerSocials && data.social) {
      const icons = { facebook: 'bi-facebook', github: 'bi-github', linkedin: 'bi-linkedin', twitter: 'bi-twitter-x', instagram: 'bi-instagram' };
      footerSocials.innerHTML = Object.entries(data.social)
        .filter(([, url]) => url)
        .map(([k, url]) => `<a href="${url}" target="_blank" rel="noopener" aria-label="${k}"><i class="bi ${icons[k] || 'bi-link-45deg'}"></i></a>`)
        .join('');
    }

    // ── RENDER PROJECT ───────────────────────────────────
    const id = new URLSearchParams(window.location.search).get('project');
    const container = document.getElementById('details-container');
    const project = (data.projects || []).find(p => p.id === id);

    if (!project) {
      container.innerHTML = `
        <div class="not-found" data-aos="fade-up">
          <h2>Project not found</h2>
          <p>The project you're looking for doesn't exist or has been removed.</p>
          <a href="/#projects" class="btn btn-primary"><i class="bi bi-arrow-left me-2"></i>Back to Projects</a>
        </div>`;
      return;
    }

    document.title = `${project.title} — Patrick Perez`;

    container.innerHTML = `
      <a href="/#projects" class="details-back" data-aos="fade-up">
        <i class="bi bi-arrow-left"></i> Back to Projects
      </a>
      <div class="details-grid">
        <div>
          <div class="details-thumbnail" data-aos="fade-up" data-aos-delay="50">
            <img src="${project.thumbnail}" alt="${project.title}" loading="eager">
          </div>
          <h1 class="details-title" data-aos="fade-up" data-aos-delay="100">${project.title}</h1>
          <div class="details-tags" data-aos="fade-up" data-aos-delay="150">
            ${(project.tags || []).map(t => `<span class="details-tag">${t}</span>`).join('')}
          </div>
          <p class="details-description" data-aos="fade-up" data-aos-delay="200">${project.description}</p>
        </div>

        <aside class="info-sidebar" data-aos="fade-up" data-aos-delay="100">
          <h3>Project Info</h3>
          ${project.client ? `
          <div class="info-row">
            <i class="bi bi-person-fill"></i>
            <div><span class="info-label">Client</span><span class="info-value">${project.client}</span></div>
          </div>` : ''}
          ${project.date ? `
          <div class="info-row">
            <i class="bi bi-calendar3"></i>
            <div><span class="info-label">Date</span><span class="info-value">${project.date}</span></div>
          </div>` : ''}
          <div class="info-row">
            <i class="bi bi-tag-fill"></i>
            <div><span class="info-label">Category</span><span class="info-value">${project.category || 'Project'}</span></div>
          </div>
          ${(project.tags || []).length ? `
          <div class="info-row">
            <i class="bi bi-code-slash"></i>
            <div><span class="info-label">Technologies</span><span class="info-value">${project.tags.join(', ')}</span></div>
          </div>` : ''}
          ${project.url ? `
          <div class="details-cta">
            <a href="${project.url}" target="_blank" rel="noopener" class="btn btn-primary">
              <i class="bi bi-box-arrow-up-right me-2"></i>${project.urlLabel || 'View Project'}
            </a>
          </div>` : ''}
        </aside>
      </div>`;

    if (typeof AOS !== 'undefined') AOS.refresh();
  })();
  </script>
</body>
</html>
